# Scheduled retrain — the "cloud execution on a free tier" layer (ADR-002).
#
# GitHub Actions is the *scheduler/trigger*; Prefect is the *flow author/executor*.
# This workflow runs the drift → retrain Prefect flow on free cloud runners on a
# cron (and on demand), so the orchestration gate is closed by Prefect while the
# free-tier cloud-execution bonus is closed here — they layer, not duplicate.
#
# F5 shipped the flow (`pdm flow`), so this now runs it for real: the season-shifted
# window is regenerated, drift is detected, and — only if it clears the F3 gate — a
# retrained model is promoted. `--min-delta -1.0` is NOT used here: the scheduled run
# uses the real gate, so a worse retrain is held (the loop cannot auto-degrade). The
# job tracks to an ephemeral runner-local SQLite registry; it demonstrates the loop
# executing on free cloud infra, not a shared production registry.
name: scheduled-retrain

on:
  schedule:
    # 06:00 UTC every Monday — a weekly drift check, cheap on free runners.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      season:
        description: "Generator season used as the drift stimulus"
        default: "heatwave"

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # The flow regenerates the season-shifted window (the drift stimulus) via the
      # pinned generator, so it needs [generate] on top of [ops] (Prefect + Evidently).
      - name: Install (ops + generate extras — Prefect, Evidently, the generator)
        run: python -m pip install -e ".[ops,generate]"

      - name: Run the drift → retrain flow
        run: pdm flow --season "${{ github.event.inputs.season || 'heatwave' }}"

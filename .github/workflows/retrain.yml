# Scheduled retrain — the "cloud execution on a free tier" layer (ADR-002).
#
# GitHub Actions is the *scheduler/trigger*; Prefect is the *flow author/executor*.
# This workflow runs the drift → retrain Prefect flow on free cloud runners on a
# cron (and on demand), so the orchestration gate is closed by Prefect while the
# free-tier cloud-execution bonus is closed here — they layer, not duplicate.
#
# F0 ships the trigger surface; the flow it calls lands in F5. Until then the step
# is a clearly-marked placeholder, so the workflow is honest about what's wired.
name: scheduled-retrain

on:
  schedule:
    # 06:00 UTC every Monday — a weekly drift check, cheap on free runners.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      season:
        description: "Generator season used as the drift stimulus"
        default: "heatwave"

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (ops extras for Prefect + Evidently)
        run: python -m pip install -e .[ops]

      - name: Run the drift → retrain flow
        run: |
          echo "Placeholder — the Prefect flow lands in F5 (see docs/ROADMAP.md)."
          echo "Will run: pdm flow --season '${{ github.event.inputs.season || 'heatwave' }}'"
